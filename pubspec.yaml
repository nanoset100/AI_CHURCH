name: ai_canaan_church
description: AI 가나안교회 - 어디서나 함께하는 당신만의 영적 안식처
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.0
  provider: ^6.1.1
  http: ^1.6.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/bgm.mp3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
